<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Liquidcast">
  <defs>
    <!-- brand background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0"  stop-color="#5fe6f5"/>
      <stop offset="0.45" stop-color="#22a7f0"/>
      <stop offset="1"  stop-color="#2f57e6"/>
    </linearGradient>
    <!-- top sheen on background -->
    <linearGradient id="bgSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- frosted white glass for the droplet -->
    <linearGradient id="glass" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#eef7fb" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#cfe6f2" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39c6f2"/>
      <stop offset="1" stop-color="#2f57e6"/>
    </linearGradient>
    <radialGradient id="spec" cx="0.35" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0b2b53" flood-opacity="0.33"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <clipPath id="dropClip">
      <path transform="translate(179.00,198.10) scale(5.55)" d="M60 12 C 74 34, 94 54, 94 74 A 34 34 0 1 1 26 74 C 26 54, 46 34, 60 12 Z"/>
    </clipPath>
  </defs>


  <!-- glass droplet foreground -->
  <g filter="url(#dropShadow)">
    <path transform="translate(179.00,198.10) scale(5.55)" d="M60 12 C 74 34, 94 54, 94 74 A 34 34 0 1 1 26 74 C 26 54, 46 34, 60 12 Z" fill="url(#glass)"/>
  </g>

  <!-- broadcast waves inside droplet (clipped) -->
  <g clip-path="url(#dropClip)">
    <g transform="translate(179.00,198.10) scale(5.55)" fill="none" stroke="url(#waveGrad)" stroke-linecap="round">
      <circle cx="60" cy="84" r="5.5" fill="url(#waveGrad)" stroke="none"/>
      <path d="M45 76 A 18 18 0 0 1 75 76" stroke-width="6"/>
      <path d="M38 68 A 28 28 0 0 1 82 68" stroke-width="6" opacity="0.72"/>
    </g>
  </g>

  <!-- glass edge highlights: bright top rim, subtle inner -->
  <g clip-path="url(#dropClip)">
    <path transform="translate(179.00,198.10) scale(5.55)" d="M60 12 C 74 34, 94 54, 94 74"
          fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="3.2" stroke-linecap="round" filter="url(#softBlur)"/>
    <ellipse cx="412.1" cy="420.1" rx="88.8" ry="122.1"
             transform="rotate(-22 412.1 420.1)" fill="url(#spec)"/>
  </g>

  <!-- thin outer contact highlight around droplet -->
  <path transform="translate(179.00,198.10) scale(5.55)" d="M60 12 C 74 34, 94 54, 94 74 A 34 34 0 1 1 26 74 C 26 54, 46 34, 60 12 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.4"/>
</svg>
